<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { 
    margin: 0; 
    background-color: #1a1a1a;
    color: #ffffff; 
    font-family: sans-serif; 
    overflow: hidden; 
    display: flex; 
    align-items: center; 
    height: 100vh; 
  }
  .ticker-container { 
    width: 100%; 
    overflow: hidden; 
    white-space: nowrap; 
    box-sizing: border-box; 
  }
  .ticker-text { 
    display: inline-block; 
    padding-left: 100%; 
    animation: ticker 40s linear infinite; 
    font-size: 1.2rem; 
  }
  .ticker-text span {
    margin-right: 40px;
  }
  @keyframes ticker { 
    0% { transform: translate(0, 0); } 
    100% { transform: translate(-100%, 0); } 
  }
</style>
</head>
<body>

<div class="ticker-container">
  <div class="ticker-text" id="ticker">Loading latest headlines...</div>
</div>

<script>
  const rssUrl = 'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml';
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;
  
  fetch(proxyUrl)
    .then(response => response.json())
    .then(data => {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(data.contents, "text/xml");
      const items = xmlDoc.querySelectorAll("item");
      let html = "";
      
      items.forEach(item => {
        const title = item.querySelector("title").textContent;
        html += `<span>${title} &nbsp;&nbsp;&nbsp;&bull;&nbsp;&nbsp;&nbsp; </span>`;
      });
      
      document.getElementById("ticker").innerHTML = html;
    })
    .catch(error => {
      document.getElementById("ticker").innerHTML = "Error loading news feed.";
    });
</script>

</body>
</html>
