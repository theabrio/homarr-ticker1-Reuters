<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { 
    margin: 0; 
    background-color: #ffffff;
    color: #36495a; 
    font-family: sans-serif; 
    overflow: hidden; 
    display: flex; 
    align-items: center; 
    height: 100vh; 
  }
  .ticker-container { 
    width: 100%; 
    overflow: hidden; 
    white-space: nowrap; 
    box-sizing: border-box; 
  }
  .ticker-text { 
    display: inline-block; 
    padding-left: 100%; 
    
    /* Forces Safari to use hardware acceleration for ultra-wide elements */
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
    will-change: transform;
    
    animation: ticker 40s linear infinite; 
    font-size: 1.2rem; 
  }
  .ticker-text span {
    margin-right: 40px;
  }
  @keyframes ticker { 
    0% { -webkit-transform: translateX(0); transform: translateX(0); } 
    100% { -webkit-transform: translateX(-100%); transform: translateX(-100%); } 
  }
</style>
</head>
<body>

<div class="ticker-container">
  <div class="ticker-text" id="ticker">Loading latest headlines...</div>
</div>

<script>
  const rssUrl = 'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml';
  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
  
  fetch(apiUrl)
    .then(response => response.json())
    .then(data => {
      // Checks if data actually exists to prevent a blank screen
      if (data.status === 'ok' && data.items && data.items.length > 0) {
        let html = "";
        data.items.forEach(item => {
          html += `<span>${item.title} &nbsp;&nbsp;&nbsp;&bull;&nbsp;&nbsp;&nbsp; </span>`;
        });
        document.getElementById("ticker").innerHTML = html;
      } else {
        document.getElementById("ticker").innerHTML = "Connected, but the feed was empty! Try another RSS link.";
      }
    })
    .catch(error => {
      document.getElementById("ticker").innerHTML = "Safari privacy shields blocked the connection.";
    });
</script>

</body>
</html>
